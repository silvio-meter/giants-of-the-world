name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Tests import .ts modules directly and rely on native type stripping.
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Data files are generated, not hand-edited
        run: |
          npm run build:data
          git diff --exit-code -- src/data \
            || (echo "::error::src/data is out of sync — run 'npm run build:data' and commit the result" && exit 1)

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://www.giantscodex.com
